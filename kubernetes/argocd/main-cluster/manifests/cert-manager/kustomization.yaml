apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - external-secret.yaml
  - production-issuer.yaml
  - staging-issuer.yaml

replacements:
  - source:
      kind: Secret
      name: cert-manager-secrets # Name of your K8s Secret
      fieldPath: data.email # Key holding the base64 encoded email string
    targets:
      - select:
          kind: ClusterIssuer
          name: letsencrypt-prod
        fieldPaths:
          - spec.acme.email
      - select:
          kind: ClusterIssuer
          name:  letsencrypt-staging
        fieldPaths:
          - spec.acme.email          