apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vpn-credentials
  namespace: default
spec:
  secretStoreRef:
    name: main-secret-store
    kind: ClusterSecretStore
  target:
    name: vpn-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: vpn/username
    - secretKey: password
      remoteRef:
        key: vpn/password
    - secretKey: private-key
      remoteRef:
        key: vpn/private-key
