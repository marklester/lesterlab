apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vpn-credentials

spec:
  secretStoreRef:
    name: main-secret-store
    kind: ClusterSecretStore
  target:
    name: vpn-credentials
    creationPolicy: Owner
  data:
    - secretKey: email
      remoteRef:
        key: email
    # - secretKey: username
    #   remoteRef:
    #     key: vpn/username
    # - secretKey: password
    #   remoteRef:
    #     key: vpn/password
    # - secretKey: private-key
    #   remoteRef:
    #     key: vpn/private-key
